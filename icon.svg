<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1b1233" />
      <stop offset="60%" stop-color="#0d081b" />
      <stop offset="100%" stop-color="#05030a" />
    </radialGradient>

    <!-- Ender Eye Pupil Glow -->
    <radialGradient id="pupil-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#a7f3d0" />
      <stop offset="70%" stop-color="#059669" />
      <stop offset="100%" stop-color="#022c22" />
    </radialGradient>

    <!-- Radar Rings Pulse Gradient -->
    <linearGradient id="radar-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.0" />
    </linearGradient>

    <!-- Icon Frame Metallic Gradient -->
    <linearGradient id="frame-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3142" />
      <stop offset="100%" stop-color="#161923" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <filter id="eye-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#10b981" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer Rounded Square App Frame -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="url(#frame-grad)" stroke="#4b5563" stroke-width="4" filter="url(#shadow)" />
  
  <!-- Inner Display Map Workspace -->
  <rect x="32" y="32" width="448" height="448" rx="84" fill="url(#space-bg)" />

  <!-- Background Navigation Grid Lines -->
  <g stroke="#1e293b" stroke-width="2">
    <!-- Horizontal Lines -->
    <line x1="32" y1="112" x2="480" y2="112" />
    <line x1="32" y1="192" x2="480" y2="192" />
    <line x1="32" y1="272" x2="480" y2="272" />
    <line x1="32" y1="352" x2="480" y2="352" />
    <line x1="32" y1="432" x2="480" y2="432" />
    <!-- Vertical Lines -->
    <line x1="112" y1="32" x2="112" y2="480" />
    <line x1="192" y1="32" x2="192" y2="480" />
    <line x1="272" y1="32" x2="272" y2="480" />
    <line x1="352" y1="32" x2="352" y2="480" />
    <line x1="432" y1="32" x2="432" y2="480" />
  </g>

  <!-- Stronghold Concentric Target Rings -->
  <g fill="none" stroke="url(#radar-line)" stroke-dasharray="8 6">
    <circle cx="256" cy="256" r="90" stroke-width="2" />
    <circle cx="256" cy="256" r="150" stroke-width="3" />
    <circle cx="256" cy="256" r="210" stroke-width="1.5" />
  </g>

  <!-- Crosshair Axis Coordinates Tracker -->
  <g stroke="#334155" stroke-width="2">
    <line x1="256" y1="32" x2="256" y2="480" stroke-dasharray="4 4" />
    <line x1="32" y1="256" x2="256" y2="256" stroke-dasharray="4 4" />
  </g>

  <!-- Center Portal Eye Icon (Eye of Ender Style) -->
  <g filter="url(#eye-glow)">
    <!-- Outer Thick Jade Sclera Shape -->
    <path d="M 120 256 C 180 140, 332 140, 392 256 C 332 372, 180 372, 120 256 Z" fill="#0d9488" stroke="#115e59" stroke-width="6" />
    
    <!-- Inner Dark Core Layer -->
    <path d="M 150 256 C 200 170, 312 170, 362 256 C 312 342, 200 342, 150 256 Z" fill="#022c22" />
    
    <!-- Main Glowing Center Pupil Sphere -->
    <circle cx="256" cy="256" r="50" fill="url(#pupil-glow)" />
    
    <!-- Minecraft Vertical Slit Slanted Pupil Cutout -->
    <path d="M 251 212 L 263 208 L 261 300 L 249 304 Z" fill="#064e3b" />
    <path d="M 253 210 L 261 208 L 259 302 L 251 304 Z" fill="#000000" />
    
    <!-- Glint / Highlight Reflections -->
    <circle cx="236" cy="236" r="8" fill="#ffffff" opacity="0.8" />
    <rect x="224" y="244" width="6" height="6" fill="#ffffff" opacity="0.6" transform="rotate(15 224 244)" />
  </g>

  <!-- Map UI Target Reticle Retainer Brackets -->
  <g fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round">
    <!-- Top Left Bracket -->
    <path d="M 216 160 L 196 160 L 196 180" />
    <!-- Top Right Bracket -->
    <path d="M 296 160 L 316 160 L 316 180" />
    <!-- Bottom Left Bracket -->
    <path d="M 216 352 L 196 352 L 196 332" />
    <!-- Bottom Right Bracket -->
    <path d="M 296 352 L 316 352 L 316 332" />
  </g>

  <!-- Player Location Tracker Pin (assets/locator.png reference representation) -->
  <g transform="translate(370, 160)" filter="url(#shadow)">
    <!-- Base Ping Circle Wave -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="10;24;10" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Map Marker Arrow Pointer -->
    <path d="M 0 -18 L 14 12 L 0 4 L -14 12 Z" fill="#ef4444" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
    <circle cx="0" cy="-2" r="3" fill="#ffffff" />
  </g>

  <!-- Discovered Stronghold Blip Nodes (Mini Map Eyes indicators) -->
  <circle cx="150" cy="320" r="7" fill="#10b981" stroke="#ffffff" stroke-width="2" filter="url(#shadow)" />
  <circle cx="340" cy="380" r="7" fill="#10b981" stroke="#ffffff" stroke-width="2" filter="url(#shadow)" />
</svg>
